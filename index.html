<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตารางเรียนออนไลน์สุดคิวท์ 🎒</title>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>ตารางเรียนของฉัน 🐻✨</h1>
            <p>เลือกระดับชั้นเพื่อดูตารางเรียนและจดการบ้านได้เลย!</p>
        </header>

        <div class="level-selector">
            <select id="gradeSelect">
                <option value="m1">มัธยมศึกษาปีที่ 1</option>
                <option value="m2">มัธยมศึกษาปีที่ 2</option>
                <option value="m3" selected>มัธยมศึกษาปีที่ 3</option>
                <option value="m4">มัธยมศึกษาปีที่ 4</option>
                <option value="m5">มัธยมศึกษาปีที่ 5</option>
                <option value="m6">มัธยมศึกษาปีที่ 6</option>
            </select>
        </div>

        <div class="schedule-container" id="scheduleContainer">
            </div>
    </div>

    <div id="noteModal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn" id="closeModal">&times;</span>
            <h2 id="modalSubjectName">วิชา</h2>
            <p>🐰 จดการบ้านหรือโน้ตเตือนความจำ:</p>
            <textarea id="noteText" rows="4" placeholder="พิมพ์ข้อความที่นี่..."></textarea>
            <button id="saveNoteBtn" class="btn-primary">บันทึกข้อมูล 💾</button>
            <p id="statusMessage" class="status-msg"></p>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
