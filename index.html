<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlanMe - ระบบจัดตารางเรียน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f0fdf4; }
        /* Neo-Brutalism Styles */
        .brutal-box {
            border: 3px solid #000;
            border-radius: 12px;
            box-shadow: 4px 4px 0px #000;
            transition: all 0.2s ease;
        }
        .brutal-button:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0px #000; }
        .brutal-button:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px #000; }
        .brutal-input { border: 3px solid #000; border-radius: 8px; box-shadow: 2px 2px 0px #000; }
        .brutal-input:focus { outline: none; border-color: #ec4899; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto mb-8">
        <div class="bg-white p-6 brutal-box flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-3xl font-bold text-pink-500 mb-2">
                    <i class="fa-solid fa-calendar-days mr-2 text-black"></i>PlanMe ตารางเรียน
                </h1>
                <div class="text-xl font-semibold">
                    👨‍🏫 ครูผู้สอน: <span id="displayTeacherName" class="text-blue-600">กำลังโหลด...</span>
                </div>
                <div class="mt-2 text-gray-700 bg-yellow-100 p-2 brutal-input inline-block">
                    <i class="fa-solid fa-note-sticky text-yellow-600 mr-1"></i> โน้ต: <span id="displayNote">-</span>
                </div>
            </div>
            
            <div class="flex gap-2">
                <button onclick="exportSchedule('png')" class="bg-blue-300 px-4 py-2 font-bold brutal-box brutal-button">.PNG</button>
                <button onclick="exportSchedule('jpg')" class="bg-green-300 px-4 py-2 font-bold brutal-box brutal-button">.JPG</button>
                <button onclick="exportSchedule('pdf')" class="bg-red-300 px-4 py-2 font-bold brutal-box brutal-button">.PDF</button>
            </div>
        </div>
    </div>

    <div id="captureArea" class="max-w-4xl mx-auto bg-white p-6 brutal-box mb-8">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold">ตารางเรียนประจำสัปดาห์</h2>
            <button onclick="toggleModal(true)" class="bg-yellow-300 text-black px-4 py-2 font-bold brutal-box brutal-button flex items-center gap-2">
                <i class="fa-solid fa-circle-plus text-xl"></i> เพิ่มตารางสอน
            </button>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse brutal-box overflow-hidden">
                <thead>
                    <tr class="bg-pink-200 border-b-3 border-black">
                        <th class="p-3 border-r-3 border-black text-center w-24">วัน</th>
                        <th class="p-3 border-r-3 border-black text-center w-24">เวลา</th>
                        <th class="p-3 border-r-3 border-black">ระดับชั้น</th>
                        <th class="p-3 border-r-3 border-black">วิชา</th>
                        <th class="p-3 text-center w-24">ห้อง</th>
                    </tr>
                </thead>
                <tbody id="scheduleBody">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="addModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex justify-center items-center z-50 p-4">
        <div class="bg-white p-6 brutal-box max-w-md w-full">
            <h2 class="text-2xl font-bold mb-4">✨ เพิ่มตารางเรียนใหม่</h2>
            <form id="scheduleForm" class="space-y-4">
                <div>
                    <label class="block font-semibold mb-1">ชื่อครูผู้สอน</label>
                    <input type="text" id="teacherName" class="w-full p-2 brutal-input" required placeholder="เช่น ครูใจดี">
                </div>
                <div>
                    <label class="block font-semibold mb-1">โน้ตข้อความ</label>
                    <input type="text" id="teacherNote" class="w-full p-2 brutal-input" placeholder="เช่น วันนี้มีสอบเก็บคะแนน">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block font-semibold mb-1">วัน</label>
                        <select id="day" class="w-full p-2 brutal-input" required>
                            <option value="จันทร์">จันทร์</option>
                            <option value="อังคาร">อังคาร</option>
                            <option value="พุธ">พุธ</option>
                            <option value="พฤหัสบดี">พฤหัสบดี</option>
                            <option value="ศุกร์">ศุกร์</option>
                        </select>
                    </div>
                    <div>
                        <label class="block font-semibold mb-1">เวลา</label>
                        <input type="text" id="time" class="w-full p-2 brutal-input" required placeholder="08:30 - 09:30">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block font-semibold mb-1">ระดับชั้น</label>
                        <select id="level" class="w-full p-2 brutal-input" required>
                            <option value="ม.1">ม.1</option>
                            <option value="ม.2">ม.2</option>
                            <option value="ม.3">ม.3</option>
                            <option value="ม.4">ม.4</option>
                            <option value="ม.5">ม.5</option>
                            <option value="ม.6">ม.6</option>
                            <option value="มหาวิทยาลัย">มหาวิทยาลัย</option>
                        </select>
                    </div>
                    <div>
                        <label class="block font-semibold mb-1">ห้องเรียน</label>
                        <input type="text" id="room" class="w-full p-2 brutal-input" required placeholder="เช่น 301">
                    </div>
                </div>
                <div>
                    <label class="block font-semibold mb-1">วิชา</label>
                    <input type="text" id="subject" class="w-full p-2 brutal-input" required placeholder="เช่น วิทยาการคำนวณ">
                </div>
                
                <div class="flex justify-end gap-2 mt-6">
                    <button type="button" onclick="toggleModal(false)" class="bg-gray-300 px-4 py-2 font-bold brutal-box brutal-button">ยกเลิก</button>
                    <button type="submit" class="bg-green-400 px-4 py-2 font-bold brutal-box brutal-button">บันทึกข้อมูล</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // 1. นำ URL ที่ได้จาก Google Apps Script (ขั้นตอนที่ 2) มาใส่ตรงนี้
        const GOOGLE_SCRIPT_URL = "นำ_URL_เว็บแอปของ_Google_Sheet_มาใส่ตรงนี้"; 

        const firebaseConfig = {
            apiKey: "AIzaSyAgWhjhHfUA5tjXNqo5Ci67mKVFhdw-62g",
            authDomain: "planme-cb749.firebaseapp.com",
            projectId: "planme-cb749",
            storageBucket: "planme-cb749.firebasestorage.app",
            messagingSenderId: "365862800805",
            appId: "1:365862800805:web:20716ddab9a92c20e32c4c",
            measurementId: "G-1DMXDB7DGS"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // UI Toggles
        window.toggleModal = (show) => {
            document.getElementById('addModal').style.display = show ? 'flex' : 'none';
        };

        // Load Data from Firebase
        async function loadSchedules() {
            const tbody = document.getElementById('scheduleBody');
            tbody.innerHTML = '<tr><td colspan="5" class="text-center p-4">กำลังโหลดข้อมูล...</td></tr>';
            
            try {
                const q = query(collection(db, "schedules"));
                const querySnapshot = await getDocs(q);
                
                let html = '';
                let lastTeacher = '';
                let lastNote = '';

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    lastTeacher = data.teacherName;
                    lastNote = data.note;
                    html += `
                        <tr class="border-b-3 border-black hover:bg-gray-50">
                            <td class="p-3 border-r-3 border-black text-center font-semibold bg-cyan-100">${data.day}</td>
                            <td class="p-3 border-r-3 border-black text-center">${data.time}</td>
                            <td class="p-3 border-r-3 border-black">${data.level}</td>
                            <td class="p-3 border-r-3 border-black font-semibold">${data.subject}</td>
                            <td class="p-3 text-center bg-yellow-100">${data.room}</td>
                        </tr>
                    `;
                });

                if(html === '') html = '<tr><td colspan="5" class="text-center p-4">ยังไม่มีตารางเรียน</td></tr>';
                tbody.innerHTML = html;

                // อัปเดตชื่อครูและโน้ตล่าสุด
                if(lastTeacher) {
                    document.getElementById('displayTeacherName').innerText = lastTeacher;
                    document.getElementById('displayNote').innerText = lastNote || "-";
                    // ตั้งค่าเริ่มต้นฟอร์ม
                    document.getElementById('teacherName').value = lastTeacher;
                    document.getElementById('teacherNote').value = lastNote;
                } else {
                    document.getElementById('displayTeacherName').innerText = "กรุณาเพิ่มตารางเรียน";
                }

            } catch (error) {
                console.error("Error loading documents: ", error);
                tbody.innerHTML = '<tr><td colspan="5" class="text-center p-4 text-red-500">เกิดข้อผิดพลาดในการโหลดข้อมูล</td></tr>';
            }
        }

        // Save Data
        document.getElementById('scheduleForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.innerText = "กำลังบันทึก...";
            submitBtn.disabled = true;

            const payload = {
                teacherName: document.getElementById('teacherName').value,
                note: document.getElementById('teacherNote').value,
                day: document.getElementById('day').value,
                time: document.getElementById('time').value,
                level: document.getElementById('level').value,
                room: document.getElementById('room').value,
                subject: document.getElementById('subject').value,
                timestamp: new Date()
            };

            try {
                // 1. Save to Firebase
                await addDoc(collection(db, "schedules"), payload);

                // 2. Save to Google Sheets (อย่าลืมใส่ URL ด้านบนให้ถูกต้อง)
                if(GOOGLE_SCRIPT_URL !== "นำ_URL_เว็บแอปของ_Google_Sheet_มาใส่ตรงนี้") {
                    fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors', // สำคัญมากสำหรับ Google Apps Script
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                }

                alert('บันทึกข้อมูลสำเร็จ!');
                toggleModal(false);
                e.target.reset();
                loadSchedules(); // Reload data

            } catch (error) {
                console.error("Error adding document: ", error);
                alert('เกิดข้อผิดพลาดในการบันทึกข้อมูล: ' + error.message);
            } finally {
                submitBtn.innerText = "บันทึกข้อมูล";
                submitBtn.disabled = false;
            }
        });

        // Export Function
        window.exportSchedule = async (type) => {
            const element = document.getElementById('captureArea');
            const canvas = await html2canvas(element, { scale: 2 });
            
            if (type === 'png' || type === 'jpg') {
                const link = document.createElement('a');
                link.download = `ตารางเรียน.${type}`;
                link.href = canvas.toDataURL(`image/${type === 'jpg' ? 'jpeg' : 'png'}`);
                link.click();
            } else if (type === 'pdf') {
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', 'a4');
                const imgData = canvas.toDataURL('image/png');
                const imgProps = pdf.getImageProperties(imgData);
                const pdfWidth = pdf.internal.pageSize.getWidth();
                const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
                
                pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
                pdf.save('ตารางเรียน.pdf');
            }
        };

        // Load on startup
        loadSchedules();
    </script>
</body>
</html>
