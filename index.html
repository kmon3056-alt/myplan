<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตารางเรียนออนไลน์ 🎒✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loadingOverlay">
        <div class="spinner"></div>
        <h2>กำลังเตรียมระบบ... 🐻</h2>
    </div>

    <div class="header-container">
        <h1>ตารางเรียนของฉัน 🎒✨</h1>
        <p class="subtitle">คลิกที่รายวิชาเพื่อจดการบ้าน คลิกที่เวลาเพื่อแก้ไขได้เลย!</p>
        
        <div class="controls">
            <select id="gradeSelect">
                <option value="ม.1">มัธยมศึกษาปีที่ 1</option>
                <option value="ม.2">มัธยมศึกษาปีที่ 2</option>
                <option value="ม.3" selected>มัธยมศึกษาปีที่ 3</option>
                <option value="ม.4">มัธยมศึกษาปีที่ 4</option>
                <option value="ม.5">มัธยมศึกษาปีที่ 5</option>
                <option value="ม.6">มัธยมศึกษาปีที่ 6</option>
            </select>
            <button class="btn-download-main" onclick="openDownloadModal()">📥 ดาวน์โหลดตารางเรียน</button>
        </div>
    </div>

    <div class="capture-area" id="captureArea">
        <div class="schedule-title-display" id="displayGradeTitle">ตารางเรียน ชั้น ม.3</div>
        <table id="scheduleTable">
            <thead>
                <tr id="timeHeaderRow">
                    <th>วัน / เวลา</th>
                </tr>
            </thead>
            <tbody id="scheduleBody">
            </tbody>
        </table>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle" class="modal-title">แก้ไขข้อมูล 📝</h2>
            <div class="input-group">
                <label>📚 ชื่อวิชา:</label>
                <input type="text" id="subjectInput" placeholder="เช่น คณิตศาสตร์">
            </div>
            <div class="input-group">
                <label>👩‍🏫 ชื่อครูผู้สอน:</label>
                <input type="text" id="teacherInput" placeholder="เช่น ครูใจดี">
            </div>
            <div class="input-group">
                <label>🐰 โน้ต/การบ้าน:</label>
                <textarea id="noteInput" placeholder="จดการบ้านเตือนความจำ..."></textarea>
            </div>
            <button class="btn-save" id="saveBtn">บันทึกข้อมูล 💾</button>
            <div class="status-msg" id="statusMsg"></div>
        </div>
    </div>

    <div id="downloadModal" class="modal">
        <div class="modal-content text-center">
            <span class="close-btn" onclick="closeDownloadModal()">&times;</span>
            <h2 class="modal-title">เลือกนามสกุลไฟล์ 📥</h2>
            <div class="download-btn-group">
                <button class="btn-png" onclick="executeDownload('png')">ดาวน์โหลด .PNG</button>
                <button class="btn-jpg" onclick="executeDownload('jpeg')">ดาวน์โหลด .JPEG</button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
